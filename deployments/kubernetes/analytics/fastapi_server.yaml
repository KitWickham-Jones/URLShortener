apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-server
spec:
  selector:
    matchLabels:
      app: analytics-server
  template:
    metadata:
      labels:
        app: analytics-server
    spec:
      containers:
      - name: analytics-server
        image: analytics_server:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: DATABASE_URL
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka-service:9092
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-server
spec:
  selector:
    app: analytics-server
  ports:
  - port: 8000
    targetPort: 8000
